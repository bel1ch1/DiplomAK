<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Научный AI-редактор</title>
    <link rel="stylesheet" href="/static/css/editor.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside id="backupsPanel" class="panel backups-panel">
        <div class="panel-header">
          <h2>Бекапы</h2>
          <div class="actions">
            <button id="saveBackupBtn" class="btn btn-outline">Сохранить</button>
            <button
              id="toggleBackupsBtn"
              class="btn btn-outline btn-icon"
              aria-label="Свернуть или раскрыть панель бэкапов"
              title="Свернуть/раскрыть бэкапы"
            >
              &laquo;
            </button>
          </div>
        </div>
        <div id="backupList" class="backup-list"></div>
      </aside>
      <div id="leftResizer" class="panel-resizer" aria-hidden="true"></div>

      <main class="panel editor-panel">
        <div class="panel-header">
          <h1>Онлайн редактор научных статей</h1>
          <div class="actions">
            <label class="file-input-label">
              Загрузить файл
              <input id="fileInput" type="file" accept=".txt,.md,.docx" />
            </label>
            <button id="applyToSourceBtn" class="btn btn-outline">Принять изменения</button>
          </div>
        </div>

        <div class="editor-grid">
          <section id="sourceCard" class="card">
            <h3>Исходный текст</h3>
            <div
              id="inputText"
              class="text-editor"
              contenteditable="true"
              data-placeholder="Введите текст вручную или загрузите файл..."
            ></div>
          </section>
          <div id="editorResizer" class="card-resizer" aria-hidden="true"></div>

          <section id="resultCard" class="card">
            <h3>Измененный текст</h3>
            <div
              id="outputText"
              class="text-editor"
              contenteditable="true"
              data-placeholder="Результат AI-редактирования появится здесь..."
            ></div>
          </section>
        </div>
      </main>
      <div id="rightResizer" class="panel-resizer" aria-hidden="true"></div>

      <aside class="panel chat-panel">
        <div class="panel-header">
          <h2>Чат с AI-помощником</h2>
        </div>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input-wrap">
          <div class="chat-controls">
            <label for="chatMode">Режим:</label>
            <select id="chatMode">
              <option value="edit">Редактирование</option>
              <option value="ask">Вопрос</option>
            </select>
          </div>
          <textarea
            id="chatInput"
            rows="3"
            placeholder="Задайте вопрос по документу..."
          ></textarea>
          <button id="sendChatBtn" class="btn btn-primary">Отправить</button>
        </div>
      </aside>
    </div>

    <div id="toast" class="toast" hidden></div>
    <script src="/static/js/editor.js"></script>
  </body>
</html>
